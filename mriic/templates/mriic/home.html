<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Generator Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .section-title {
            margin-top: 30px;
            margin-bottom: 15px;
            border-bottom: 2px solid #222;
            padding-bottom: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #222;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #444;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Resume Generator</h1>
        <p>Enter your details below to generate your resume.</p>

        <form method="POST" action="">
            {% csrf_token %}

            <h2 class="section-title">Personal Information</h2>

            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <label for="address">Address / Location</label>
                <input type="text" id="address" name="address" placeholder="Example: Faridabad, India">
            </div>

            <div class="form-group">
                <label for="linkedin">LinkedIn Profile</label>
                <input type="url" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/your-profile">
            </div>

            <div class="form-group">
                <label for="github">GitHub Profile</label>
                <input type="url" id="github" name="github" placeholder="https://github.com/your-username">
            </div>

            <h2 class="section-title">Career Objective</h2>

            <div class="form-group">
                <label for="career_objective">Career Objective / Summary</label>
                <textarea id="career_objective" name="career_objective" placeholder="Write a short career objective or professional summary"></textarea>
            </div>

            <h2 class="section-title">Education</h2>

            <div class="form-group">
                <label for="degree">Degree / Course</label>
                <input type="text" id="degree" name="degree" placeholder="Example: BSc Information Technology" required>
            </div>

            <div class="form-group">
                <label for="institution">Institution / University</label>
                <input type="text" id="institution" name="institution" placeholder="Enter your university name" required>
            </div>

            <div class="form-group">
                <label for="graduation_year">Graduation Year</label>
                <input type="text" id="graduation_year" name="graduation_year" placeholder="Example: 2026">
            </div>

            <div class="form-group">
                <label for="cgpa">CGPA / Percentage</label>
                <input type="text" id="cgpa" name="cgpa" placeholder="Example: 8.4 CGPA">
            </div>

            <h2 class="section-title">Skills</h2>

            <div class="form-group">
                <label for="skills">Skills</label>
                <textarea id="skills" name="skills" placeholder="Example: HTML, CSS, JavaScript, Python, Django, React"></textarea>
            </div>

            <h2 class="section-title">Projects</h2>

            <div class="form-group">
                <label for="projects">Projects</label>
                <textarea id="projects" name="projects" placeholder="Mention your projects with short descriptions"></textarea>
            </div>

            <h2 class="section-title">Experience</h2>

            <div class="form-group">
                <label for="experience">Work Experience / Internship</label>
                <textarea id="experience" name="experience" placeholder="Mention internship, work experience, or training details"></textarea>
            </div>

            <h2 class="section-title">Certifications</h2>

            <div class="form-group">
                <label for="certifications">Certifications</label>
                <textarea id="certifications" name="certifications" placeholder="Example: Python Certification, Web Development Internship"></textarea>
            </div>

            <h2 class="section-title">Achievements</h2>

            <div class="form-group">
                <label for="achievements">Achievements</label>
                <textarea id="achievements" name="achievements" placeholder="Mention awards, achievements, or participation"></textarea>
            </div>

            <button type="submit">Generate Resume</button>
        </form>
    </div>

</body>
</html>
