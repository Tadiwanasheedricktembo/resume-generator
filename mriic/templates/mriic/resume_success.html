<!DOCTYPE html>
<html>
<head>
    <title>Resume Generated</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .box {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            background: #1f4e79;
            color: white;
            padding: 10px 16px;
            border-radius: 6px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Resume PDF Generated</h1>

    <p>Your resume PDF was generated successfully.</p>

    {% if resume.generated_pdf %}
        <a href="{% url 'download_resume' resume.id %}">Download Resume PDF</a>
    {% endif %}

    <br>

    <a href="{% url 'create_resume' %}">Create Another Resume</a>
</div>

</body>
</html>
