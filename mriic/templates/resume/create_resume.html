<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Resume</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f3f6fb; color: #233; }
        .container { max-width: 900px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        h1 { color: #1f4e79; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #cfd8e3; border-radius: 6px; box-sizing: border-box; }
        textarea.form-control { min-height: 90px; }
        .btn { background: #1f4e79; color: white; padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .helptext { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Your Resume</h1>\n        {% if error_message %}<div style='padding:12px; margin-bottom:16px; border:1px solid #d9534f; background:#fff3f3; color:#b00020;'>{{ error_message }}</div>{% endif %}\n        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.non_field_errors }}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}<div class="helptext">{{ field.help_text }}</div>{% endif %}
                    {% for error in field.errors %}<div style="color:#b00020">{{ error }}</div>{% endfor %}
                </div>
            {% endfor %}
            <button type="submit" class="btn">Generate Resume PDF</button>
        </form>
    </div>
</body>
</html>
